name: Validate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Validate repository structure
        run: python scripts/validate_repository.py

      - name: Validate UltraCode contract with Python
        run: python plugins/ultracode/skills/ultracode/scripts/check_contract.py

      - name: Validate UltraCode contract with PowerShell
        shell: powershell
        run: >-
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File
          plugins/ultracode/skills/ultracode/scripts/check_contract.ps1
